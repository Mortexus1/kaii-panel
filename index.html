<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAİİ Koordinat Sorgu Paneli</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #030712;
      --panel: rgba(10, 16, 28, 0.88);
      --panel-border: rgba(58, 78, 120, 0.22);
      --text: #e8f1ff;
      --muted: #8fa4c5;
      --input-bg: rgba(3, 12, 25, 0.92);
      --input-border: rgba(0, 203, 255, 0.18);
      --shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      --cyan: #11d9ff;
      --blue: #20a6ff;
      --purple: #7c3aed;
      --card: rgba(10, 18, 30, 0.82);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(0, 183, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 20%, rgba(124, 58, 237, 0.10), transparent 24%),
        repeating-linear-gradient(
          to right,
          rgba(20, 40, 80, 0.07) 0,
          rgba(20, 40, 80, 0.07) 1px,
          transparent 1px,
          transparent 60px
        ),
        linear-gradient(180deg, #050b16 0%, #02060d 100%);
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 68px 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 1100px;
    }

    .panel {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(18px);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #50e6ff;
      text-shadow: 0 0 14px rgba(17, 217, 255, 0.45);
      min-width: 150px;
    }

    .title-box h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .title-box p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 14px;
      align-items: start;
    }

    .left {
      display: grid;
      gap: 14px;
    }

    .right {
      display: grid;
      gap: 10px;
    }

    input, select, button {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      min-height: 56px;
      font-size: 18px;
    }

    input, select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text);
      padding: 0 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    input::placeholder { color: #7387a7; }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: 0.18s ease;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      color: #07111b;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .btn-secondary {
      background: linear-gradient(180deg, rgba(40,45,58,0.9), rgba(21,24,32,0.95));
      color: #dbe8ff;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .btn-secondary:hover { filter: brightness(1.08); }

    .count-row {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr);
      gap: 10px;
    }

    .results {
      margin-top: 22px;
      display: grid;
      gap: 14px;
    }

    .empty {
      background: rgba(8, 15, 26, 0.75);
      border: 1px dashed rgba(97, 134, 196, 0.22);
      border-radius: 18px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    .result-card {
      background: var(--card);
      border: 1px solid rgba(72, 96, 144, 0.22);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .nick {
      font-size: 22px;
      font-weight: 800;
    }

    .badge {
      background: linear-gradient(90deg, rgba(17,217,255,0.12), rgba(124,58,237,0.18));
      border: 1px solid rgba(17,217,255,0.22);
      color: #9feeff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .meta-box {
      background: rgba(5, 13, 24, 0.8);
      border: 1px solid rgba(77, 106, 156, 0.18);
      border-radius: 14px;
      padding: 12px;
    }

    .meta-box span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .meta-box strong {
      font-size: 18px;
    }

    .help {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .right {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .panel { padding: 20px; }
      .logo { font-size: 30px; letter-spacing: 4px; }
      .title-box h1 { font-size: 26px; }
      .right { grid-template-columns: 1fr; }
      .count-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="panel">
      <div class="header">
        <div class="logo">KAİİ</div>
        <div class="title-box">
          <h1>Koordinat Sorgu Paneli</h1>
          <p>isimle arat — sayfa yenilenmeden altta gösterir</p>
        </div>
      </div>

      <div class="grid">
        <div class="left">
          <input id="searchInput" type="text" placeholder="Hesap adı veya X Z (örn: hesabim veya 1200 -800)" />

          <select id="worldSelect">
            <option value="sancak">Sancak</option>
            <option value="yakamoz">Yakamoz</option>
            <option value="avrasya">Avrasya</option>
            <option value="pruva">Pruva</option>
            <option value="velena">Velena</option>
            <option value="flador">Flador</option>
            <option value="astra">Astra</option>
          </select>

          <div class="count-row">
            <select id="sortSelect">
              <option value="closest">↓</option>
              <option value="farthest">↑</option>
            </select>
            <input id="limitInput" type="number" min="1" max="50" value="5" />
          </div>
        </div>

        <div class="right">
          <button class="btn-primary" id="searchBtn">Sorgula</button>
          <button class="btn-secondary" id="clearBtn">Temizle</button>
        </div>
      </div>

      <div class="help">
        İsim girersen direkt hesabı bulur. X Z girersen en yakın hesapları sıralar.
      </div>

      <div id="results" class="results">
        <div class="empty">Henüz sonuç yok.</div>
      </div>
    </div>
  </div>

 function localdenHesaplariGetir() {
    const data = localStorage.getItem("kaii_hesaplar");

    if (!data) {
      return {
        sancak: [],
        yakamoz: [],
        avrasya: [],
        pruva: [],
        velena: [],
        flador: [],
        astra: []
      };
    }

    try {
      const parsed = JSON.parse(data);
      return {
        sancak: parsed.sancak || [],
        yakamoz: parsed.yakamoz || [],
        avrasya: parsed.avrasya || [],
        pruva: parsed.pruva || [],
        velena: parsed.velena || [],
        flador: parsed.flador || [],
        astra: parsed.astra || []
      };
    } catch {
      return {
        sancak: [],
        yakamoz: [],
        avrasya: [],
        pruva: [],
        velena: [],
        flador: [],
        astra: []
      };
    }
  }

  function hesaplariBirlestir() {
    const local = localdenHesaplariGetir();

    return {
      sancak: [...varsayilanHesaplar.sancak, ...local.sancak],
      yakamoz: [...varsayilanHesaplar.yakamoz, ...local.yakamoz],
      avrasya: [...varsayilanHesaplar.avrasya, ...local.avrasya],
      pruva: [...varsayilanHesaplar.pruva, ...local.pruva],
      velena: [...varsayilanHesaplar.velena, ...local.velena],
      flador: [...varsayilanHesaplar.flador, ...local.flador],
      astra: [...varsayilanHesaplar.astra, ...local.astra]
    };
  }

  let hesaplar = hesaplariBirlestir();

  const results = document.getElementById("results");
  const searchInput = document.getElementById("searchInput");
  const worldSelect = document.getElementById("worldSelect");
  const sortSelect = document.getElementById("sortSelect");
  const limitInput = document.getElementById("limitInput");
  const searchBtn = document.getElementById("searchBtn");
  const clearBtn = document.getElementById("clearBtn");

  function mesafeHesapla(x1, z1, x2, z2) {
    return Math.sqrt((x2 - x1) ** 2 + (z2 - z1) ** 2);
  }

  function bosEkran(text = "Sonuç bulunamadı.") {
    results.innerHTML = `<div class="empty">${text}</div>`;
  }

  function dunyaAdiYazdir(world) {
    return world.charAt(0).toUpperCase() + world.slice(1);
  }

  function sonucKartlariOlustur(veriler, world) {
    if (!veriler.length) {
      bosEkran();
      return;
    }

    results.innerHTML = veriler.map(item => {
      const distanceHTML = item.distance !== undefined
        ? `<div class="badge">Mesafe: ${item.distance.toFixed(2)}</div>`
        : `<div class="badge">Direkt eşleşme</div>`;

      return `
        <div class="result-card">
          <div class="result-top">
            <div class="nick">${item.nick}</div>
            ${distanceHTML}
          </div>

          <div class="meta">
            <div class="meta-box">
              <span>Dünya</span>
              <strong>${dunyaAdiYazdir(world)}</strong>
            </div>
            <div class="meta-box">
              <span>X</span>
              <strong>${item.x}</strong>
            </div>
            <div class="meta-box">
              <span>Z</span>
              <strong>${item.z}</strong>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function sorgula() {
    hesaplar = hesaplariBirlestir();

    const query = searchInput.value.trim();
    const world = worldSelect.value;
    const sortType = sortSelect.value;
    const limit = Math.max(1, Math.min(50, Number(limitInput.value) || 10));
    const seciliDunya = hesaplar[world] || [];

    if (!query) {
      bosEkran("Bir hesap adı veya koordinat gir.");
      return;
    }

    const isimSonucu = seciliDunya.filter(h =>
      h.nick.toLowerCase().includes(query.toLowerCase())
    );

    if (isimSonucu.length) {
      sonucKartlariOlustur(isimSonucu.slice(0, limit), world);
      return;
    }

    const parts = query.replace(/,/g, " ").split(/\s+/).map(Number);

    if (parts.length >= 2 && !Number.isNaN(parts[0]) && !Number.isNaN(parts[1])) {
      const hedefX = parts[0];
      const hedefZ = parts[1];

      const hesaplanmis = seciliDunya
        .map(h => ({
          ...h,
          distance: mesafeHesapla(hedefX, hedefZ, h.x, h.z)
        }))
        .sort((a, b) => sortType === "closest" ? a.distance - b.distance : b.distance - a.distance)
        .slice(0, limit);

      sonucKartlariOlustur(hesaplanmis, world);
      return;
    }

    bosEkran("İsim eşleşmedi. Koordinat için örnek giriş: 1200 -800");
  }

  searchBtn.addEventListener("click", sorgula);

  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    worldSelect.value = "sancak";
    sortSelect.value = "closest";
    limitInput.value = 10;
    bosEkran("Temizlendi. Yeni sorgu girebilirsin.");
  });

  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sorgula();
  });
</script>
